services:
  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:4000
    depends_on:
      - gateway
    restart: unless-stopped

  gateway:
    build: ./gateway
    ports:
      - "4000:4000"
    environment:
      - PORT=4000
      - JWT_SECRET=${JWT_SECRET}
      - AUTH_SERVICE_URL=http://auth-service:4001
      - POSTS_SERVICE_URL=http://posts-service:4003
    depends_on:
      - auth-service
      - posts-service
    restart: unless-stopped

  auth-service:
    build: ./backend/auth-service
    ports:
      - "4001:4001"
    environment:
      - PORT=4001
      - JWT_SECRET=${JWT_SECRET}
      - JWT_REFRESH_SECRET=${JWT_REFRESH_SECRET}
      - DATABASE_URL=postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres-auth:5432/${POSTGRES_DB}
    depends_on:
      postgres-auth:
        condition: service_healthy
    restart: unless-stopped

  posts-service:
    build: ./backend/posts-service
    ports:
      - "4003:4003"
    environment:
      - PORT=4003
      - MONGO_URI=mongodb://mongo-posts:27017/posts_db
    depends_on:
      - mongo-posts
    restart: unless-stopped

  mongo-posts:
    image: mongo:7
    volumes:
      - mongo_posts_data:/data/db
    restart: unless-stopped

  postgres-auth:
    image: postgres:16-alpine
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
    ports:
      - "5433:5432" 
    volumes:
      - postgres_auth_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  postgres_auth_data:
  mongo_posts_data: